name: 📊 Benchmarks

on:
  push: {}

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Rust
        run: |
          rustup toolchain install stable
          rustup default stable

      - name: Build
        run: cargo build --release

      - run: make bench
